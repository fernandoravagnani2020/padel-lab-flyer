<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Flyers — Pádel Lab Academy</title>
<meta name="description" content="Portal interno de Pádel Lab Academy para generar el flyer diario de turnos y cupos.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0E1A15">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PL Flyers">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="assets/padel-lab-isotipo-app.svg">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
<style>
/* ===== Tokens — Guía de marca Pádel Lab v1·2026 ===== */
:root{
  --tinta:#0E1A15;
  --tinta-2:#13241C;
  --cancha:#14A07A;
  --cancha-hi:#1FC796;
  --crema:#EAF1EC;
  --crema-dim:rgba(234,241,236,.64);
  --linea:rgba(234,241,236,.14);
  --display:'Space Grotesk',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--tinta)}
body{
  font-family:var(--display);background:var(--tinta);color:var(--crema);
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100dvh;
}
::selection{background:var(--cancha);color:var(--tinta)}
button{font:inherit;cursor:pointer;color:inherit}
input,select{font:inherit;color:inherit}

/* ===== App shell (safe areas iPhone) ===== */
.top{
  display:flex;align-items:center;gap:12px;
  padding:calc(12px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) 12px calc(20px + env(safe-area-inset-left));
  border-bottom:1px solid var(--linea);position:sticky;top:0;background:rgba(14,26,21,.92);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:20;
}
.top img{height:32px}
.top b{font-size:14px;letter-spacing:.02em;display:block;line-height:1.15}
.top small{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.42em;color:var(--cancha);display:block}
.top .titulo-app{
  margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;color:var(--crema-dim);text-align:right;
}
.app{
  display:grid;grid-template-columns:minmax(340px,440px) 1fr;gap:0;
}
@media(max-width:920px){.app{grid-template-columns:1fr}}

/* ===== Editor ===== */
.editor{
  padding:22px calc(20px + env(safe-area-inset-right)) 30px calc(20px + env(safe-area-inset-left));
  border-right:1px solid var(--linea);display:flex;flex-direction:column;gap:22px;
}
@media(max-width:920px){.editor{border-right:none}}
.campo>label,.grupo>label{
  font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.24em;
  text-transform:uppercase;color:var(--cancha-hi);display:block;margin-bottom:8px;
}
.campo input[type="text"],.campo input[type="date"]{
  width:100%;background:var(--tinta-2);border:1px solid var(--linea);border-radius:6px;
  padding:12px;font-size:16px;transition:border-color .2s;min-height:48px;
  color-scheme:dark;-webkit-appearance:none;appearance:none;
}
.campo input:focus{outline:none;border-color:var(--cancha)}
input:focus-visible,button:focus-visible,select:focus-visible{outline:2px solid var(--cancha-hi);outline-offset:2px}

/* turnos */
#turnos{display:flex;flex-direction:column;gap:12px}
.turno{
  border:1px solid var(--linea);border-radius:8px;padding:14px;background:var(--tinta-2);
  display:flex;flex-direction:column;gap:10px;
}
.turno__fila{display:grid;gap:8px}
.turno__fila--a{grid-template-columns:92px 76px 1fr;align-items:end}
.turno__fila--a .turno__borrar{justify-self:end;width:48px}
.turno__fila--c{grid-template-columns:92px 1fr 1fr}
.campo-mini span{
  display:block;font-family:var(--mono);font-size:8.5px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;color:var(--crema-dim);margin-bottom:5px;
}
.campo-mini input,.campo-mini select{
  width:100%;background:var(--tinta);border:1px solid var(--linea);border-radius:6px;
  padding:10px 9px;font-size:15px;font-family:var(--mono);min-height:44px;
  -webkit-appearance:none;appearance:none;color-scheme:dark;
}
.campo-mini input:focus,.campo-mini select:focus{outline:none;border-color:var(--cancha)}
.campo-mini input[type=number]{-moz-appearance:textfield}
.campo-mini input::-webkit-outer-spin-button,.campo-mini input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.turno__borrar{
  background:none;border:1px solid var(--linea);border-radius:6px;min-height:44px;
  color:var(--crema-dim);font-size:17px;line-height:1;transition:all .2s;
}
.turno__borrar:hover{border-color:#d66;color:#e88}
.agregar{
  background:none;border:1px dashed var(--cancha);border-radius:6px;color:var(--cancha-hi);
  padding:13px;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;transition:background .2s;width:100%;min-height:48px;
}
.agregar:hover{background:rgba(20,160,122,.12)}

/* acciones */
.acciones{
  display:flex;flex-direction:column;gap:10px;position:sticky;bottom:0;background:var(--tinta);
  padding:14px 0 calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--linea);
}
.btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:var(--mono);font-size:12.5px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;border:none;border-radius:6px;padding:15px;min-height:52px;
  transition:all .2s var(--ease);
}
.btn--verde{background:var(--cancha);color:var(--tinta)}
.btn--verde:hover{background:var(--cancha-hi)}
.btn--verde[disabled]{opacity:.5;cursor:wait}
.btn--gris{background:none;border:1px solid var(--linea);color:var(--crema-dim)}
.btn--gris:hover{border-color:#d66;color:#e88}
.aviso{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--crema-dim);text-align:center}

/* ===== Vista previa ===== */
.previa{
  display:flex;flex-direction:column;align-items:center;padding:26px 20px 60px;gap:14px;
  background:radial-gradient(circle at 70% 10%,rgba(20,160,122,.08),transparent 55%),var(--tinta);
}
.previa__label{
  font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.3em;
  text-transform:uppercase;color:var(--crema-dim);
}
.lienzo-wrap{
  width:min(100%,380px);aspect-ratio:1080/1920;position:relative;
  box-shadow:0 30px 80px -20px rgba(0,0,0,.7);border-radius:6px;overflow:hidden;
}
#escala{position:absolute;inset:0;transform-origin:top left}

/* =====================================================================
   EL FLYER — plantilla oficial 1080×1920 (historia de Instagram)
   Fondo crema, monograma de agua, lista de turnos y botón "Reservá tu turno"
   ===================================================================== */
#flyer{
  width:1080px;height:1920px;background:#EDEAE2;color:#16181A;
  position:relative;overflow:hidden;font-family:var(--display);
}
#flyer .f-marca-agua{
  position:absolute;width:790px;right:-175px;bottom:-215px;pointer-events:none;
}
#flyer .f-marca-agua path{fill:#DFE7DE}
.f-marca{position:absolute;top:150px;left:96px;display:flex;align-items:center;gap:24px}
.f-marca img{height:90px}
.f-marca b{font-size:40px;font-weight:700;color:#16181A;letter-spacing:.01em;line-height:1;display:block}
.f-marca small{font-family:var(--mono);font-size:16px;font-weight:600;letter-spacing:.52em;color:#14A07A;display:block;margin-top:9px}
.f-eyebrow{
  position:absolute;top:318px;left:98px;display:flex;align-items:center;gap:24px;
  font-family:var(--mono);font-weight:600;font-size:25px;letter-spacing:.4em;
  text-transform:uppercase;color:#14A07A;
}
.f-eyebrow::before{content:"";width:58px;height:3px;background:#14A07A;flex:none}
.f-titulo{
  position:absolute;top:372px;left:92px;right:96px;
  font-weight:700;font-size:152px;line-height:.94;letter-spacing:-.02em;color:#16181A;
  text-transform:uppercase;
}
.f-titulo .verde{color:#14A07A}
.f-lista{position:absolute;top:662px;left:96px;right:96px}
.f-row{
  display:flex;align-items:center;gap:40px;
  padding:36px 0;border-top:2px solid #DBD8CF;
}
.f-row:last-child{border-bottom:2px solid #DBD8CF}
.f-hora{font-size:66px;font-weight:700;width:238px;flex:none;letter-spacing:-.01em}
.f-info{flex:1;min-width:0}
.f-nombre{font-size:37px;font-weight:700;letter-spacing:-.01em}
.f-sub{
  font-family:var(--mono);font-size:21px;font-weight:600;letter-spacing:.18em;
  color:#8E8C85;margin-top:11px;text-transform:uppercase;white-space:nowrap;
}
.f-chip{
  flex:none;font-family:var(--mono);font-size:21px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:#0F8666;background:rgba(20,160,122,.10);
  border:2.5px solid rgba(20,160,122,.55);border-radius:999px;padding:15px 30px;
}
.f-row.f-lleno .f-hora,.f-row.f-lleno .f-nombre{color:#A5A39B}
.f-row.f-lleno .f-sub{color:#B3B1A9}
.f-row.f-lleno .f-chip{color:#A5A39B;background:transparent;border-color:#C6C4BB}
.f-vacio{
  font-family:var(--mono);font-size:23px;color:#A5A39B;letter-spacing:.14em;
  padding:70px 0;text-align:center;
}
.f-boton{
  position:absolute;left:96px;right:96px;bottom:148px;height:126px;border-radius:999px;
  background:#131414;color:#F3F1EA;display:flex;align-items:center;justify-content:center;gap:24px;
  font-size:42px;font-weight:700;letter-spacing:-.01em;
}
.f-boton svg{width:52px;height:52px;flex:none}

/* compacto: 7 turnos o más */
#flyer.f-compacto .f-row{padding:24px 0;gap:32px}
#flyer.f-compacto .f-hora{font-size:54px;width:200px}
#flyer.f-compacto .f-nombre{font-size:32px}
#flyer.f-compacto .f-sub{font-size:18px;margin-top:8px}
#flyer.f-compacto .f-chip{font-size:18px;padding:11px 24px}
</style>
</head>
<body>

<header class="top">
  <img src="assets/padel-lab-isotipo-negativo.svg" alt="">
  <span><b>PÁDEL LAB</b><small>ACADEMY</small></span>
  <span class="titulo-app">Flyer diario<br>de turnos</span>
</header>

<div class="app">
  <!-- ============ EDITOR ============ -->
  <aside class="editor">
    <div class="campo">
      <label for="in-fecha">Fecha del flyer</label>
      <input type="date" id="in-fecha">
    </div>

    <div class="grupo">
      <label>Turnos del día</label>
      <div id="turnos"></div>
      <button type="button" class="agregar" id="agregar" style="margin-top:12px">+ Agregar turno</button>
    </div>

    <div class="acciones">
      <button class="btn btn--verde" id="descargar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12m0 0 5-5m-5 5-5-5M4 21h16"/></svg>
        Descargar flyer (1080×1920)
      </button>
      <button class="btn btn--gris" id="limpiar">Vaciar turnos</button>
      <p class="aviso">Los datos quedan guardados en este teléfono.</p>
    </div>
  </aside>

  <!-- ============ VISTA PREVIA ============ -->
  <main class="previa">
    <p class="previa__label">Vista previa · 1080 × 1920 · Historia de Instagram</p>
    <div class="lienzo-wrap">
      <div id="escala">
        <div id="flyer">
          <svg class="f-marca-agua" viewBox="0 0 378.23 407.19" aria-hidden="true">
            <path d="M244.32,352.75v-202.15c-2.16,6.88-5.06,13.34-8.73,19.38-8.92,14.67-21.03,26.02-36.29,34.03-3.3,1.73-6.72,3.24-10.21,4.6v198.59h189.14v-54.44h-133.9Z"/>
            <path d="M219.35,45.82c-8.62-14.52-20.57-25.78-35.84-33.8-7.84-4.11-16.3-7.15-25.37-9.15,0,.42.03.83.03,1.25,0,19.32-4.03,37.72-11.26,54.41,4.56,1.91,8.69,4.45,12.32,7.7,8.77,7.87,13.16,18.6,13.16,32.21v4.54c0,13.61-4.39,24.35-13.16,32.21-8.78,7.87-20.27,11.8-34.48,11.8H59.89v-11.18c-12.4,3.69-25.51,5.7-39.09,5.7-7.07,0-14.01-.54-20.79-1.57v177.64h59.89v-116.14h70.77c19.35,0,36.67-4.01,51.95-12.02,15.27-8.01,27.37-19.35,36.29-34.03,8.92-14.67,13.38-31.83,13.38-51.49v-6.35c0-19.96-4.31-37.2-12.93-51.72Z"/>
            <path d="M0,0v128.88c6.77,1.12,13.71,1.74,20.79,1.74,13.64,0,26.77-2.2,39.09-6.21V54.44h64.88c4.1,0,7.95.37,11.6,1.02,7-15.7,10.93-33.07,10.93-51.34,0-1.04-.05-2.06-.08-3.1-5.33-.66-10.83-1.03-16.55-1.03H0Z"/>
          </svg>
          <div class="f-marca">
            <img src="assets/padel-lab-isotipo-positivo.svg" alt="">
            <span><b>PÁDEL LAB</b><small>ACADEMY</small></span>
          </div>
          <p class="f-eyebrow">Turnos disponibles</p>
          <h1 class="f-titulo" id="f-titulo"></h1>
          <div class="f-lista" id="f-lista"></div>
          <div class="f-boton">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="12" fill="#14A07A"/><path fill="#F3F1EA" d="M12 4.5a7.5 7.5 0 0 0-6.45 11.32L4.5 19.5l3.8-1a7.5 7.5 0 1 0 3.7-14Zm4.05 10.57c-.15.53-.97.98-1.42 1.05-.38.08-.83.08-1.35-.07-.3-.08-.75-.23-1.28-.45-2.25-.98-3.67-3.23-3.82-3.38-.08-.15-.9-1.2-.9-2.32 0-1.13.6-1.65.75-1.88.22-.22.45-.3.6-.3h.45c.15 0 .3 0 .45.38.15.37.6 1.42.6 1.5.08.07.08.22 0 .37-.3.68-.68.75-.52 1.05.67 1.13 1.5 1.8 2.47 2.25.23.15.38.08.53-.07l.75-.9c.15-.23.3-.15.52-.08l1.58.75c.22.15.37.15.45.3 0 .08 0 .53-.15 1.05Z"/></svg>
            Reservá tu turno
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
  var DIAS_SEMANA = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
  var MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  var CATEGORIAS = ['Libres','Principiante','8ª','7ª','6ª','5ª','4ª','3ª','2ª','1ª'];
  var DIVISIONES = ['Ambas','Masculina','Femenina'];
  var CLASES = ['Clase grupal','Clase privada 1-a-1','Clínica grupal','Preparación torneos','Escuela juvenil'];
  var CLAVE = 'padellab-flyer-v2';

  function manana(){
    var d = new Date(); d.setDate(d.getDate()+1);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  var estado = cargar() || {
    fecha: manana(),
    turnos: [{hora:'18:00', titulo:'Clase grupal', dur:90, cat:'5ª', div:'Ambas', cupos:2}]
  };

  function guardar(){ try{ localStorage.setItem(CLAVE, JSON.stringify(estado)); }catch(e){} }
  function cargar(){ try{ return JSON.parse(localStorage.getItem(CLAVE)); }catch(e){ return null; } }

  /* ---------- fecha ---------- */
  var inFecha = document.getElementById('in-fecha');
  inFecha.value = estado.fecha;
  inFecha.addEventListener('input', function(){
    if(!inFecha.value) return;
    estado.fecha = inFecha.value;
    pintarFlyer(); guardar();
  });

  /* ---------- turnos ---------- */
  var cont = document.getElementById('turnos');

  function opciones(lista, actual){
    return lista.map(function(o){
      return '<option value="'+o+'"'+(o===actual?' selected':'')+'>'+o+'</option>';
    }).join('');
  }

  function pintarEditor(){
    cont.innerHTML = '';
    estado.turnos.forEach(function(t,i){
      var card = document.createElement('div');
      card.className = 'turno';
      card.innerHTML =
        '<div class="turno__fila turno__fila--a">' +
          '<div class="campo-mini"><span>Hora</span><input type="text" inputmode="numeric" maxlength="6" value="'+t.hora+'" data-t="'+i+'|hora" placeholder="18:00"></div>' +
          '<div class="campo-mini"><span>Cupos</span><input type="number" min="0" max="99" value="'+t.cupos+'" data-t="'+i+'|cupos"></div>' +
          '<button type="button" class="turno__borrar" data-borrar="'+i+'" aria-label="Borrar turno">×</button>' +
        '</div>' +
        '<div class="campo-mini"><span>Clase</span><input type="text" list="clases" maxlength="26" value="'+t.titulo+'" data-t="'+i+'|titulo"></div>' +
        '<div class="turno__fila turno__fila--c">' +
          '<div class="campo-mini"><span>Minutos</span><input type="number" min="15" max="240" step="15" value="'+t.dur+'" data-t="'+i+'|dur"></div>' +
          '<div class="campo-mini"><span>Categoría</span><select data-t="'+i+'|cat">'+opciones(CATEGORIAS,t.cat)+'</select></div>' +
          '<div class="campo-mini"><span>División</span><select data-t="'+i+'|div">'+opciones(DIVISIONES,t.div)+'</select></div>' +
        '</div>';
      cont.appendChild(card);
    });

    cont.querySelectorAll('[data-t]').forEach(function(inp){
      var ref = inp.dataset.t.split('|'); // indice|prop
      inp.addEventListener('input', function(){
        var v = inp.type==='number' ? Math.max(0, parseInt(inp.value||'0',10)) : inp.value;
        estado.turnos[+ref[0]][ref[1]] = v;
        pintarFlyer(); guardar();
      });
    });

    cont.querySelectorAll('.turno__borrar').forEach(function(b){
      b.addEventListener('click', function(){
        estado.turnos.splice(+b.dataset.borrar,1);
        pintarEditor(); pintarFlyer(); guardar();
      });
    });
  }

  document.getElementById('agregar').addEventListener('click', function(){
    var ultimo = estado.turnos[estado.turnos.length-1];
    estado.turnos.push({
      hora: '', titulo: ultimo ? ultimo.titulo : 'Clase grupal',
      dur: ultimo ? ultimo.dur : 90, cat:'Libres', div:'Ambas', cupos:2
    });
    pintarEditor(); pintarFlyer(); guardar();
    var inputs = cont.querySelectorAll('.turno:last-child input');
    if(inputs.length) inputs[0].focus();
  });

  /* ---------- flyer ---------- */
  function subtitulo(t){
    var partes = [];
    if(t.dur) partes.push(t.dur+' MIN');
    var cat = (t.cat==='Libres' || t.cat==='Cupos libres') ? 'TODOS LOS NIVELES' : t.cat.toUpperCase();
    if(t.div && t.div!=='Ambas') cat += ' ' + t.div.toUpperCase();
    partes.push(cat);
    return partes.join(' · ');
  }

  function ordenarHora(a,b){
    return (a.hora||'99').localeCompare(b.hora||'99');
  }

  function pintarFlyer(){
    // título: día de la semana + fecha
    var p = estado.fecha.split('-'); // YYYY-MM-DD, local
    var f = new Date(+p[0], +p[1]-1, +p[2]);
    document.getElementById('f-titulo').innerHTML =
      DIAS_SEMANA[f.getDay()] + '<br>' + f.getDate() + ' <span class="verde">' + MESES[f.getMonth()] + '</span>';

    var lista = document.getElementById('f-lista');
    lista.innerHTML = '';
    var turnos = estado.turnos.slice().sort(ordenarHora);

    turnos.forEach(function(t){
      var sin = !t.cupos;
      var row = document.createElement('div');
      row.className = 'f-row' + (sin ? ' f-lleno' : '');
      row.innerHTML =
        '<div class="f-hora">'+(t.hora||'--:--')+'</div>' +
        '<div class="f-info">' +
          '<div class="f-nombre">'+(t.titulo||'Clase')+'</div>' +
          '<div class="f-sub">'+subtitulo(t)+'</div>' +
        '</div>' +
        '<div class="f-chip">'+(sin ? 'COMPLETO' : t.cupos+' '+(t.cupos===1?'CUPO':'CUPOS'))+'</div>';
      lista.appendChild(row);
    });

    if(!turnos.length){
      lista.innerHTML = '<p class="f-vacio">— Agregá turnos en el panel —</p>';
    }
    document.getElementById('flyer').classList.toggle('f-compacto', turnos.length >= 7);

    // bajadas siempre en una línea: achicar hasta que entren
    lista.querySelectorAll('.f-sub').forEach(function(el){
      var px = 21;
      el.style.fontSize = '';
      while(el.scrollWidth > el.clientWidth && px > 14){
        px -= 1;
        el.style.fontSize = px + 'px';
      }
    });
  }

  /* ---------- escala vista previa ---------- */
  function escalar(){
    var wrap = document.querySelector('.lienzo-wrap');
    document.getElementById('escala').style.transform = 'scale(' + (wrap.clientWidth / 1080) + ')';
  }
  window.addEventListener('resize', escalar);

  /* ---------- exportar PNG ---------- */
  document.getElementById('descargar').addEventListener('click', function(){
    var btn = this;
    btn.disabled = true;
    var original = btn.innerHTML;
    btn.textContent = 'Generando…';

    var clon = document.getElementById('flyer').cloneNode(true);
    var caja = document.createElement('div');
    caja.style.cssText = 'position:fixed;left:-3000px;top:0;width:1080px;height:1920px;overflow:hidden;z-index:-1;';
    caja.appendChild(clon);
    document.body.appendChild(caja);

    document.fonts.ready.then(function(){
      return html2canvas(clon, {backgroundColor:'#EDEAE2', scale:1, logging:false});
    }).then(function(canvas){
      var a = document.createElement('a');
      a.download = 'flyer-' + estado.fecha + '.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }).catch(function(err){
      alert('No se pudo generar el PNG: ' + err.message);
    }).finally(function(){
      caja.remove();
      btn.disabled = false;
      btn.innerHTML = original;
    });
  });

  /* ---------- vaciar ---------- */
  document.getElementById('limpiar').addEventListener('click', function(){
    if(!confirm('¿Vaciar todos los turnos del flyer?')) return;
    estado.turnos = [];
    pintarEditor(); pintarFlyer(); guardar();
  });

  /* ---------- PWA ---------- */
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }

  /* ---------- init ---------- */
  pintarEditor();
  pintarFlyer();
  escalar();
})();
</script>
<datalist id="clases">
  <option value="Clase grupal"></option>
  <option value="Clase privada 1-a-1"></option>
  <option value="Clínica grupal"></option>
  <option value="Preparación torneos"></option>
  <option value="Escuela juvenil"></option>
</datalist>
</body>
</html>
