<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Flyers — Pádel Lab Academy</title>
<meta name="description" content="Portal interno de Pádel Lab Academy para generar el flyer diario de turnos y cupos.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0E1A15">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PL Flyers">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="assets/padel-lab-isotipo-app.svg">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Tokens — Guía de marca Pádel Lab v1·2026 ===== */
:root{
  --tinta:#0E1A15;
  --tinta-2:#13241C;
  --cancha:#14A07A;
  --cancha-hi:#1FC796;
  --crema:#EAF1EC;
  --crema-dim:rgba(234,241,236,.64);
  --linea:rgba(234,241,236,.14);
  --display:'Space Grotesk',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--tinta)}
body{
  font-family:var(--display);background:var(--tinta);color:var(--crema);
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
  height:100dvh;overflow:hidden;display:flex;flex-direction:column;
}
::selection{background:var(--cancha);color:var(--tinta)}
button{font:inherit;cursor:pointer;color:inherit}
input,select{font:inherit;color:inherit}

/* ===== App shell (safe areas iPhone) ===== */
.top{
  display:flex;align-items:center;gap:12px;
  padding:calc(12px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) 12px calc(20px + env(safe-area-inset-left));
  border-bottom:1px solid var(--linea);position:sticky;top:0;background:rgba(14,26,21,.92);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:20;
}
.top img{height:32px}
.top b{font-size:14px;letter-spacing:.02em;display:block;line-height:1.15}
.top small{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.42em;color:var(--cancha);display:block}
.top .titulo-app{
  margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;color:var(--crema-dim);text-align:right;
}
.app{flex:1;min-height:0;display:grid;grid-template-columns:minmax(340px,440px) 1fr;gap:0}
@media(max-width:920px){.app{grid-template-columns:1fr}}

/* ===== Editor ===== */
.editor{
  padding:16px calc(20px + env(safe-area-inset-right)) 0 calc(20px + env(safe-area-inset-left));
  border-right:1px solid var(--linea);display:flex;flex-direction:column;gap:14px;
  min-height:0;overflow:hidden;
}
@media(max-width:920px){.editor{border-right:none}}
.grupo{flex:1;min-height:0;display:flex;flex-direction:column}
.lista-scroll{
  flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;gap:8px;padding-bottom:10px;
}
.campo>label,.grupo>label{
  font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.24em;
  text-transform:uppercase;color:var(--cancha-hi);display:block;margin-bottom:8px;
}
.campo input[type="date"]{
  width:100%;background:var(--tinta-2);border:1px solid var(--linea);border-radius:6px;
  padding:12px;font-size:16px;transition:border-color .2s;min-height:48px;
  color-scheme:dark;-webkit-appearance:none;appearance:none;
}
.campo input:focus{outline:none;border-color:var(--cancha)}
input:focus-visible,button:focus-visible,select:focus-visible{outline:2px solid var(--cancha-hi);outline-offset:2px}

/* turnos */
#turnos{display:flex;flex-direction:column;gap:8px}
.turno{
  border:1px solid var(--linea);border-radius:8px;padding:10px;background:var(--tinta-2);
  display:flex;flex-direction:column;gap:7px;
}
.turno__fila{display:grid;gap:7px}
.turno__fila--a{grid-template-columns:92px 76px 1fr;align-items:end}
.turno__fila--a .turno__borrar{justify-self:end;width:48px}
.turno__fila--c{grid-template-columns:92px 1fr 1fr}
.campo-mini span{
  display:block;font-family:var(--mono);font-size:8px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;color:var(--crema-dim);margin-bottom:3px;
}
.campo-mini input,.campo-mini select{
  width:100%;background:var(--tinta);border:1px solid var(--linea);border-radius:6px;
  padding:6px 8px;font-size:16px;font-family:var(--mono);min-height:40px;
  -webkit-appearance:none;appearance:none;color-scheme:dark;
}
.campo-mini input:focus,.campo-mini select:focus{outline:none;border-color:var(--cancha)}
.campo-mini input[type=number]{-moz-appearance:textfield}
.campo-mini input::-webkit-outer-spin-button,.campo-mini input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.turno__borrar{
  background:none;border:1px solid var(--linea);border-radius:6px;min-height:40px;
  color:var(--crema-dim);font-size:17px;line-height:1;transition:all .2s;
}
.turno__borrar:hover{border-color:#d66;color:#e88}
.agregar{
  background:none;border:1px dashed var(--cancha);border-radius:6px;color:var(--cancha-hi);
  padding:10px;font-family:var(--mono);font-size:11.5px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;transition:background .2s;width:100%;min-height:44px;flex:none;
}
.agregar:hover{background:rgba(20,160,122,.12)}

/* acciones */
.acciones{
  flex:none;display:flex;flex-direction:column;gap:8px;background:var(--tinta);
  padding:12px 0 calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--linea);
}
.btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:var(--mono);font-size:12.5px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;border:none;border-radius:6px;padding:15px;min-height:52px;
  transition:all .2s var(--ease);
}
.btn--verde{background:var(--cancha);color:var(--tinta)}
.btn--verde:hover{background:var(--cancha-hi)}
.btn--verde[disabled]{opacity:.5;cursor:wait}
.btn--gris{background:none;border:1px solid var(--linea);color:var(--crema-dim)}
.btn--gris:hover{border-color:#d66;color:#e88}
.aviso{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--crema-dim);text-align:center}

/* ===== Vista previa ===== */
.previa{
  display:flex;flex-direction:column;align-items:center;padding:26px 20px 60px;gap:14px;
  min-height:0;overflow-y:auto;
  background:radial-gradient(circle at 70% 10%,rgba(20,160,122,.08),transparent 55%),var(--tinta);
}
.previa__label{
  font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.3em;
  text-transform:uppercase;color:var(--crema-dim);
}
#lienzo{
  width:min(100%,380px);height:auto;display:block;border-radius:6px;
  box-shadow:0 30px 80px -20px rgba(0,0,0,.7);
}
@media(max-width:920px){.previa{display:none}} /* en el teléfono, editor a pantalla completa */
</style>
</head>
<body>

<header class="top">
  <img src="assets/padel-lab-isotipo-negativo.svg" alt="">
  <span><b>PÁDEL LAB</b><small>ACADEMY</small></span>
  <span class="titulo-app">Flyer diario<br>de turnos</span>
</header>

<div class="app">
  <!-- ============ EDITOR ============ -->
  <aside class="editor">
    <div class="campo">
      <label for="in-fecha">Fecha del flyer</label>
      <input type="date" id="in-fecha">
    </div>

    <div class="grupo">
      <label>Turnos del día</label>
      <div class="lista-scroll">
        <div id="turnos"></div>
        <button type="button" class="agregar" id="agregar">+ Agregar turno</button>
      </div>
    </div>

    <div class="acciones">
      <button class="btn btn--verde" id="descargar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12m0 0 5-5m-5 5-5-5M4 21h16"/></svg>
        Descargar flyer (1080×1920)
      </button>
      <button class="btn btn--gris" id="limpiar">Vaciar turnos</button>
      <p class="aviso">Los datos quedan guardados en este teléfono.</p>
    </div>
  </aside>

  <!-- ============ VISTA PREVIA ============ -->
  <main class="previa">
    <p class="previa__label">Vista previa · 1080 × 1920 · Historia de Instagram</p>
    <canvas id="lienzo" width="1080" height="1920" aria-label="Vista previa del flyer"></canvas>
  </main>
</div>

<script>
(function(){
  var DIAS_SEMANA = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
  var MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  var CATEGORIAS = ['Libres','Principiante','8ª','7ª','6ª','5ª','4ª','3ª','2ª','1ª'];
  var DIVISIONES = ['Ambas','Masculina','Femenina'];
  var CLAVE = 'padellab-flyer-v2';

  /* ===== Colores y métricas de la plantilla (medidos del ejemplo aprobado) ===== */
  var T = {
    tinta:'#16181A', verde:'#14A07A', grisTexto:'#8E8C85',
    apagado:'#A5A39B', apagadoSub:'#B3B1A9', bordeApagado:'#C6C4BB',
    linea:'#DBD8CF', chipTexto:'#0F8666', chipFondo:'rgba(20,160,122,.10)', chipBorde:'rgba(20,160,122,.55)',
    margen:96, derecha:984,
    tituloX:92, titulo1Y:471, titulo2Y:580, tituloPx:124,
    listaY:670, filaAlto:143, filaMax:6, listaFin:1620,
    horaPx:62, nombrePx:36, subPx:20, chipPx:20
  };

  function manana(){
    var d = new Date(); d.setDate(d.getDate()+1);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function hoy(){
    var d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  var estado = cargar() || {
    fecha: manana(),
    turnos: [{hora:'18:00', titulo:'Clase grupal', dur:60, cat:'Libres', div:'Ambas', cupos:2}]
  };
  if(estado.fecha < hoy()) estado.fecha = manana(); // flyer viejo → arranca en mañana

  function guardar(){ try{ localStorage.setItem(CLAVE, JSON.stringify(estado)); }catch(e){} }
  function cargar(){ try{ return JSON.parse(localStorage.getItem(CLAVE)); }catch(e){ return null; } }

  /* ===== Recursos del lienzo ===== */
  var lienzo = document.getElementById('lienzo');
  var ctx = lienzo.getContext('2d');
  var plantilla = new Image();
  var plantillaLista = new Promise(function(res){ plantilla.onload = res; plantilla.onerror = res; });
  plantilla.src = 'assets/plantilla.png';

  var fuentesListas = Promise.all([
    document.fonts.load('700 '+T.tituloPx+'px "Space Grotesk"'),
    document.fonts.load('700 '+T.horaPx+'px "Space Grotesk"'),
    document.fonts.load('700 '+T.nombrePx+'px "Space Grotesk"'),
    document.fonts.load('600 '+T.subPx+'px "JetBrains Mono"'),
    document.fonts.load('700 '+T.chipPx+'px "JetBrains Mono"')
  ]).catch(function(){});

  /* texto con tracking (compatible con todos los navegadores) */
  function medirTracked(texto, tracking){
    var w = 0;
    for(var i=0;i<texto.length;i++) w += ctx.measureText(texto[i]).width + (i<texto.length-1 ? tracking : 0);
    return w;
  }
  function dibujarTracked(texto, x, y, tracking){
    var cx = x;
    for(var i=0;i<texto.length;i++){
      ctx.fillText(texto[i], cx, y);
      cx += ctx.measureText(texto[i]).width + tracking;
    }
  }
  function pastilla(x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  /* ===== Render del flyer ===== */
  function subtitulo(t){
    var partes = [];
    if(t.dur) partes.push(t.dur+' MIN');
    var cat = (t.cat==='Libres' || t.cat==='Cupos libres') ? 'TODOS LOS NIVELES' : String(t.cat).toUpperCase();
    if(t.div && t.div!=='Ambas') cat += ' ' + t.div.toUpperCase();
    partes.push(cat);
    return partes.join(' · ');
  }
  function ordenarHora(a,b){ return (a.hora||'99').localeCompare(b.hora||'99'); }

  function render(){
    ctx.clearRect(0,0,1080,1920);
    if(plantilla.complete && plantilla.naturalWidth) ctx.drawImage(plantilla,0,0,1080,1920);
    else { ctx.fillStyle = '#EDEAE2'; ctx.fillRect(0,0,1080,1920); }
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';

    /* título: día + fecha */
    var p = estado.fecha.split('-');
    var f = new Date(+p[0], +p[1]-1, +p[2]);
    ctx.fillStyle = T.tinta;
    ctx.font = '700 '+T.tituloPx+'px "Space Grotesk"';
    dibujarTracked(DIAS_SEMANA[f.getDay()], T.tituloX, T.titulo1Y, -2);
    var dia = String(f.getDate());
    dibujarTracked(dia, T.tituloX, T.titulo2Y, -2);
    var wDia = medirTracked(dia, -2) + ctx.measureText(' ').width + 6;
    ctx.fillStyle = T.verde;
    dibujarTracked(MESES[f.getMonth()], T.tituloX + wDia, T.titulo2Y, -2);

    /* filas de turnos */
    var turnos = estado.turnos.slice().sort(ordenarHora);
    if(!turnos.length) return;

    var paso = turnos.length <= T.filaMax ? T.filaAlto
             : Math.floor((T.listaFin - T.listaY) / turnos.length);
    var compacta = paso < T.filaAlto ? paso / T.filaAlto : 1;

    function lineaDivisoria(y){
      ctx.fillStyle = T.linea;
      ctx.fillRect(T.margen, y, T.derecha - T.margen, 2);
    }

    turnos.forEach(function(t, k){
      var yTop = T.listaY + paso * k;
      var centro = yTop + paso/2;
      var sin = !t.cupos;
      lineaDivisoria(yTop);

      /* hora */
      ctx.fillStyle = sin ? T.apagado : T.tinta;
      ctx.font = '700 '+Math.round(T.horaPx*compacta)+'px "Space Grotesk"';
      ctx.fillText(t.hora || '--:--', T.margen, centro + Math.round(21*compacta));

      /* chip (se dibuja antes para saber cuánto lugar queda) */
      var chipTexto = sin ? 'COMPLETO' : t.cupos + ' ' + (t.cupos===1 ? 'CUPO' : 'CUPOS');
      ctx.font = '700 '+T.chipPx+'px "JetBrains Mono"';
      var wChipTexto = medirTracked(chipTexto, 3);
      var chipH = 52, chipW = wChipTexto + 60;
      var chipX = T.derecha - chipW, chipY = centro - chipH/2;
      pastilla(chipX, chipY, chipW, chipH, chipH/2);
      if(!sin){ ctx.fillStyle = T.chipFondo; ctx.fill(); }
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = sin ? T.bordeApagado : T.chipBorde;
      ctx.stroke();
      ctx.fillStyle = sin ? T.apagado : T.chipTexto;
      dibujarTracked(chipTexto, chipX + (chipW - wChipTexto)/2, centro + 7, 3);

      /* nombre de la clase */
      var xInfo = 324, anchoInfo = chipX - 30 - xInfo;
      ctx.fillStyle = sin ? T.apagado : T.tinta;
      var nombrePx = Math.round(T.nombrePx * compacta);
      ctx.font = '700 '+nombrePx+'px "Space Grotesk"';
      var nombre = t.titulo || 'Clase';
      while(ctx.measureText(nombre).width > anchoInfo && nombrePx > 22){
        nombrePx -= 1;
        ctx.font = '700 '+nombrePx+'px "Space Grotesk"';
      }
      ctx.fillText(nombre, xInfo, centro - Math.round(2*compacta));

      /* bajada técnica */
      ctx.fillStyle = sin ? T.apagadoSub : T.grisTexto;
      var subPx = T.subPx, subTexto = subtitulo(t);
      ctx.font = '600 '+subPx+'px "JetBrains Mono"';
      while(medirTracked(subTexto, 3.5) > anchoInfo && subPx > 13){
        subPx -= 1;
        ctx.font = '600 '+subPx+'px "JetBrains Mono"';
      }
      dibujarTracked(subTexto, xInfo, centro + Math.round(56*compacta) - (paso < 100 ? 6 : 0), 3.5);
    });
    lineaDivisoria(T.listaY + paso * turnos.length);
  }

  function pintarFlyer(){
    Promise.all([plantillaLista, fuentesListas]).then(render);
  }

  /* ===== Editor ===== */
  var inFecha = document.getElementById('in-fecha');
  inFecha.value = estado.fecha;
  inFecha.addEventListener('input', function(){
    if(!inFecha.value) return;
    estado.fecha = inFecha.value;
    pintarFlyer(); guardar();
  });

  var cont = document.getElementById('turnos');

  function opciones(lista, actual){
    return lista.map(function(o){
      return '<option value="'+o+'"'+(o===actual?' selected':'')+'>'+o+'</option>';
    }).join('');
  }

  function pintarEditor(){
    cont.innerHTML = '';
    estado.turnos.forEach(function(t,i){
      var card = document.createElement('div');
      card.className = 'turno';
      card.innerHTML =
        '<div class="turno__fila turno__fila--a">' +
          '<div class="campo-mini"><span>Hora</span><input type="text" inputmode="numeric" maxlength="6" value="'+t.hora+'" data-t="'+i+'|hora" placeholder="18:00"></div>' +
          '<div class="campo-mini"><span>Cupos</span><input type="number" min="0" max="99" value="'+t.cupos+'" data-t="'+i+'|cupos"></div>' +
          '<button type="button" class="turno__borrar" data-borrar="'+i+'" aria-label="Borrar turno">×</button>' +
        '</div>' +
        '<div class="campo-mini"><span>Clase</span><input type="text" list="clases" maxlength="26" value="'+t.titulo+'" data-t="'+i+'|titulo"></div>' +
        '<div class="turno__fila turno__fila--c">' +
          '<div class="campo-mini"><span>Minutos</span><input type="number" min="15" max="240" step="15" value="'+t.dur+'" data-t="'+i+'|dur" placeholder="60"></div>' +
          '<div class="campo-mini"><span>Categoría</span><select data-t="'+i+'|cat">'+opciones(CATEGORIAS,t.cat)+'</select></div>' +
          '<div class="campo-mini"><span>División</span><select data-t="'+i+'|div">'+opciones(DIVISIONES,t.div)+'</select></div>' +
        '</div>';
      cont.appendChild(card);
    });

    cont.querySelectorAll('[data-t]').forEach(function(inp){
      var ref = inp.dataset.t.split('|'); // indice|prop
      inp.addEventListener('input', function(){
        var v = inp.type==='number' ? Math.max(0, parseInt(inp.value||'0',10)) : inp.value;
        estado.turnos[+ref[0]][ref[1]] = v;
        pintarFlyer(); guardar();
      });
      if(ref[1]==='hora'){
        inp.addEventListener('blur', function(){
          var v = normalizarHora(inp.value);
          inp.value = v;
          estado.turnos[+ref[0]].hora = v;
          pintarFlyer(); guardar();
        });
      }
    });

    cont.querySelectorAll('.turno__borrar').forEach(function(b){
      b.addEventListener('click', function(){
        estado.turnos.splice(+b.dataset.borrar,1);
        pintarEditor(); pintarFlyer(); guardar();
      });
    });
  }

  document.getElementById('agregar').addEventListener('click', function(){
    var ultimo = estado.turnos[estado.turnos.length-1];
    estado.turnos.push({
      hora: '', titulo: ultimo ? ultimo.titulo : 'Clase grupal',
      dur: ultimo ? ultimo.dur : 60, cat:'Libres', div:'Ambas', cupos:2
    });
    pintarEditor(); pintarFlyer(); guardar();
    var nueva = cont.querySelector('.turno:last-child');
    if(nueva){
      nueva.scrollIntoView({block:'nearest'});
      var inp = nueva.querySelector('input');
      if(inp) inp.focus({preventScroll:true});
    }
  });

  /* ---------- hora: "18" → "18:00", "1830" → "18:30" ---------- */
  function normalizarHora(v){
    v = String(v||'').trim().replace(/[.,;hH\s]+/g, ':').replace(/:+/g, ':').replace(/:$/, '');
    if(!v) return '';
    var pad = function(n){ return String(parseInt(n,10)).padStart(2,'0'); };
    if(/^\d{1,2}$/.test(v)) return pad(v) + ':00';
    if(/^\d{3,4}$/.test(v)) return pad(v.slice(0, v.length-2)) + ':' + v.slice(-2);
    var m = v.match(/^(\d{1,2}):(\d{1,2})$/);
    if(m) return pad(m[1]) + ':' + (m[2].length===1 ? m[2]+'0' : m[2]);
    return v;
  }

  /* ===== Exportar: hoja de compartir en iPhone, descarga en desktop ===== */
  document.getElementById('descargar').addEventListener('click', function(){
    var btn = this;
    btn.disabled = true;
    var original = btn.innerHTML;
    btn.textContent = 'Generando…';
    var nombre = 'flyer-' + estado.fecha + '.png';

    function descargarClasico(){
      var a = document.createElement('a');
      a.download = nombre;
      a.href = lienzo.toDataURL('image/png');
      a.click();
    }

    Promise.all([plantillaLista, fuentesListas]).then(function(){
      render();
      return new Promise(function(res){ lienzo.toBlob(res, 'image/png'); });
    }).then(function(blob){
      var file = blob ? new File([blob], nombre, {type:'image/png'}) : null;
      if(file && navigator.canShare && navigator.canShare({files:[file]})){
        return navigator.share({files:[file]}).catch(function(err){
          if(err && err.name !== 'AbortError') descargarClasico();
        });
      }
      descargarClasico();
    }).catch(function(err){
      alert('No se pudo generar el PNG: ' + err.message);
    }).finally(function(){
      btn.disabled = false;
      btn.innerHTML = original;
    });
  });

  /* ---------- vaciar ---------- */
  document.getElementById('limpiar').addEventListener('click', function(){
    if(!confirm('¿Vaciar todos los turnos del flyer?')) return;
    estado.turnos = [];
    pintarEditor(); pintarFlyer(); guardar();
  });

  /* ---------- PWA ---------- */
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }

  /* ---------- init ---------- */
  pintarEditor();
  pintarFlyer();
})();
</script>
